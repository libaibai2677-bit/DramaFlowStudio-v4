name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Basic import check
      run: |
        python -c "import streamlit; print('Streamlit OK')"
        python -c "from src.core.dto import EngineResponseDTO; print('DTO OK')"
        python -c "from src.core.normalizer import ResultNormalizer; print('Normalizer OK')"
