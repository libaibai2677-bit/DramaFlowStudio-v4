<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DramaFlow Studio v4</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0e1117;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      max-width: 700px;
    }

      margin-top: 20px;

      background: #4f8bf9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>

  <div class="card">
    <h1>🎬 DramaFlow Studio v4</h1>
    <p>An AI-powered SaaS system for intelligent search, recommendation, and explainable AI workflows.</p>

</html>
