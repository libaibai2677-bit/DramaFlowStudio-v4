<!-- 🧠 DramaFlow AI - Product UI Dashboard v2 (Upgraded) -->
<!-- Goal: Move from MVP UI → Product-grade AI Workspace Interface -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DramaFlow AI - Workspace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0b1220;
            --panel: #111827;
            --panel2: #0f172a;
            --border: #243244;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #3b82f6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .history {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 8px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--muted);
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .workspace {
            flex: 1;
            display: flex;
        }

        .editor {
            width: 40%;
            padding: 16px;
            border-right: 1px solid var(--border);
        }

        .output {
            flex: 1;
            padding: 16px;
            background: var(--panel2);
            overflow: auto;
        }

        textarea, input {
            width: 100%;
            background: #0b1220;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        pre {
            white-space: pre-wrap;
            font-size: 13px;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🧠 DramaFlow Workspace</div>
    <div class="history" id="history">
        <div class="history-item">No sessions yet</div>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <span class="tag">AI Runtime v1</span>
        <span class="tag">Agent Orchestrator</span>
        <span class="tag">Observability ON</span>
    </div>

    <div class="workspace">

        <div class="editor">
            <h3>🎯 Task Input</h3>
            <textarea id="goal" rows="8" placeholder="Describe your task..."></textarea>

            <label>Mode</label>
            <input id="mode" value="auto" />

            <button onclick="runAI()">▶ Execute Agent</button>
        </div>

        <div class="output">
            <h3>📊 Execution Output</h3>
            <pre id="output">Waiting for execution...</pre>
        </div>

    </div>
</div>

<script>
let sessions = [];

async function runAI() {
    const goal = document.getElementById('goal').value;
    const mode = document.getElementById('mode').value;

    document.getElementById('output').innerText = 'Running agent...';

    const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal, mode })
    });

    const data = await res.json();

    document.getElementById('output').innerText = JSON.stringify(data, null, 2);

    // store session
    sessions.unshift(goal);
    renderHistory();
}

function renderHistory() {
    const el = document.getElementById('history');
    el.innerHTML = sessions.map(s =>
        `<div class="history-item">${s.slice(0, 60)}</div>`
    ).join('');
}
</script>

</body>
</html>
